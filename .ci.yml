.common_only: &common_only
  stage: test
  before_script:
    - apt-get update && apt-get install -y wget tar
    - wget https://github.com/casey/just/releases/download/1.55.1/just-1.55.1-x86_64-unknown-linux-musl.tar.gz -P /tmp
    - tar -xvf /tmp/just-1.55.1-x86_64-unknown-linux-musl.tar.gz -C /tmp/
    - mv /tmp/just /usr/bin/

stages:
  - test
  - docs

image: debian:bookworm
variables:
  DEBIAN_FRONTEND: noninteractive
  SCALENODE_RAM: 4096
  SCALENODE_CPU: 1
  SCALENODE_DISK: 5

lint:
  <<: *common_only
  script:
    - just install-debian-deps
    - just test-lint

build_docs:
  <<: *common_only
  stage: docs
  variables:
    SCALENODE_RAM: 18432
    SCALENODE_CPU: 5
    SCALENODE_DISK: 20
  tags: [docs]
  script:
    - just install-debian-deps --docs
    - just docs
    - tar cf "$CI_DOCS_ARCHIVE" -C docs/build/html/ .
  artifacts:
    paths:
      - docs/build
      - $CI_DOCS_ARCHIVE

examples:
  <<: *common_only
  script:
    - just install-debian-deps
    - just examples
  artifacts:
    paths:
      - examples/**/build

